; PlatformIO Configuration for GSR Dual Sensor
; Board: Seeedstudio XIAO SAMD21
;   CH1: Grove GSR on A0 (Grove connector)
;   CH2: Grove GSR on A1 (pin wiring)

[env:seeed_xiao]
platform = atmelsam
board = seeed_xiao
framework = arduino
monitor_speed = 115200
build_flags = 
    -D SAMPLE_RATE_HZ=100
    -D GSR_PIN_1=A0
    -D GSR_PIN_2=A1
